name: Update Parking Lots Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate parking lots catalog
        run: npm --prefix SofiaGoApp run generate:parking-lots

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- SofiaGoApp/src/features/parkingZones/data/parkingLots.generated.json; then
            echo "No parking catalog changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SofiaGoApp/src/features/parkingZones/data/parkingLots.generated.json
          git commit -m "chore: update parking lots catalog"
          git push