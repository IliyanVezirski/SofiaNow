name: Publish Parking Catalog

on:
  push:
    branches:
      - main
    paths:
      - 'SofiaGoApp/src/features/parkingZones/data/parkingLots.generated.json'
      - '.github/workflows/publish-parking-catalog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: parking-catalog-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build publish artifact
        run: |
          mkdir -p parking-catalog
          cp SofiaGoApp/src/features/parkingZones/data/parkingLots.generated.json parking-catalog/parkingLots.generated.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: parking-catalog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4